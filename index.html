<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Frequency – Dein Englisch-Level-Check</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #12142A;
    --bg-grad: radial-gradient(120% 140% at 15% -10%, #1C2050 0%, #12142A 45%, #0D0F20 100%);
    --surface: #1B1E3C;
    --surface-2: #232849;
    --surface-3: #2B3157;
    --border: rgba(255,255,255,0.09);
    --border-strong: rgba(255,255,255,0.18);
    --text: #F1F3FF;
    --text-muted: #9AA3C9;
    --text-dim: #6B7299;

    --a2: #5EEAD4;
    --a2-dim: rgba(94,234,212,0.16);
    --b1: #8CF26B;
    --b1-dim: rgba(140,242,107,0.16);
    --b2: #FFB648;
    --b2-dim: rgba(255,182,72,0.16);
    --c1: #FF6B8B;
    --c1-dim: rgba(255,107,139,0.16);

    --accent: #FFB648;
    --accent-2: #5EEAD4;
    --good: #8CF26B;
    --bad: #FF6B6B;
    --review: #C9A6FF;

    --radius-sm: 10px;
    --radius: 16px;
    --radius-lg: 24px;

    --font-display: 'Space Grotesk', sans-serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;

    --shadow-card: 0 8px 30px rgba(0,0,0,0.35);
  }

  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background: var(--bg-grad) fixed;
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
  }
  #app{ min-height:100vh; display:flex; flex-direction:column; }

  h1,h2,h3,h4{ font-family: var(--font-display); font-weight:700; margin:0; letter-spacing:-0.01em; }
  p{ margin:0; }
  a{ color: var(--accent-2); }
  button{ font-family: var(--font-body); }
  ::selection{ background: var(--accent); color:#12142A; }

  :focus-visible{ outline: 2px solid var(--accent-2); outline-offset: 2px; }

  .mono{ font-family: var(--font-mono); }

  /* ---------- layout helpers ---------- */
  .shell{ max-width: 1080px; margin: 0 auto; padding: 28px 20px 60px; width:100%; flex:1; }
  .shell-narrow{ max-width: 720px; margin:0 auto; padding: 28px 20px 60px; width:100%; flex:1; }
  .row{ display:flex; align-items:center; }
  .between{ justify-content:space-between; }
  .gap-8{ gap:8px; } .gap-12{ gap:12px; } .gap-16{ gap:16px; } .gap-24{ gap:24px; }
  .wrap{ flex-wrap:wrap; }
  .stack{ display:flex; flex-direction:column; }
  .muted{ color:var(--text-muted); }
  .dim{ color:var(--text-dim); }
  .center-text{ text-align:center; }

  /* ---------- topbar ---------- */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding: 18px 24px; max-width:1080px; margin:0 auto; width:100%;
  }
  .brand{ display:flex; align-items:center; gap:10px; font-family:var(--font-display); font-weight:700; font-size:19px; }
  .brand-mark{ width:30px; height:30px; border-radius:9px; background:conic-gradient(from 200deg, var(--a2), var(--b1), var(--b2), var(--c1), var(--a2)); position:relative; flex:none; }
  .brand-mark::after{ content:""; position:absolute; inset:5px; background:var(--bg); border-radius:6px; }
  .brand small{ display:block; font-family:var(--font-body); font-weight:500; font-size:11px; color:var(--text-dim); letter-spacing:0.03em; }

  .ghost-btn{
    background:transparent; border:1px solid var(--border-strong); color:var(--text);
    padding:9px 16px; border-radius:99px; font-size:14px; font-weight:600; cursor:pointer;
    transition:.15s;
  }
  .ghost-btn:hover{ border-color:var(--accent-2); color:var(--accent-2); }

  /* ---------- buttons ---------- */
  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    border:none; cursor:pointer; font-weight:700; font-family:var(--font-body);
    border-radius:99px; padding:14px 26px; font-size:15px; transition:.15s transform, .15s box-shadow, .15s opacity;
  }
  .btn:active{ transform: scale(0.97); }
  .btn:disabled{ opacity:0.4; cursor:not-allowed; }
  .btn-primary{ background: linear-gradient(135deg, var(--accent), #FF8F5E); color:#1A1400; box-shadow: 0 6px 20px rgba(255,182,72,0.25); }
  .btn-primary:hover:not(:disabled){ box-shadow: 0 8px 26px rgba(255,182,72,0.4); }
  .btn-secondary{ background: var(--surface-3); color:var(--text); border:1px solid var(--border-strong); }
  .btn-secondary:hover:not(:disabled){ border-color:var(--accent-2); }
  .btn-block{ width:100%; }
  .btn-sm{ padding:9px 16px; font-size:13px; }
  .btn-icon{ width:38px; height:38px; padding:0; border-radius:10px; background:var(--surface-3); border:1px solid var(--border); color:var(--text); cursor:pointer; display:inline-flex; align-items:center; justify-content:center; }
  .btn-icon:hover{ border-color:var(--accent-2); }
  .btn-danger-ghost{ background:transparent; color:var(--bad); border:1px solid rgba(255,107,107,0.35); border-radius:99px; padding:9px 16px; font-weight:600; font-size:13px; cursor:pointer; }

  /* ---------- cards ---------- */
  .card{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:26px; box-shadow:var(--shadow-card); }
  .card-flat{ background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius); padding:18px; }
  .tag{ display:inline-flex; align-items:center; gap:6px; padding:4px 11px; border-radius:99px; font-family:var(--font-mono); font-size:12px; font-weight:600; letter-spacing:0.02em; }
  .tag-A2{ background:var(--a2-dim); color:var(--a2); }
  .tag-B1{ background:var(--b1-dim); color:var(--b1); }
  .tag-B2{ background:var(--b2-dim); color:var(--b2); }
  .tag-C1{ background:var(--c1-dim); color:var(--c1); }

  input[type=text], input[type=search], textarea, select{
    background:var(--surface-2); border:1px solid var(--border-strong); color:var(--text);
    border-radius:12px; padding:13px 15px; font-size:15px; font-family:var(--font-body); width:100%;
  }
  textarea{ resize:vertical; min-height:80px; line-height:1.5; }
  input::placeholder, textarea::placeholder{ color:var(--text-dim); }
  label.field-label{ font-size:13px; font-weight:600; color:var(--text-muted); margin-bottom:7px; display:block; }

  /* ---------- landing ---------- */
  .hero{ text-align:center; padding: 40px 10px 10px; }
  .hero h1{ font-size:44px; line-height:1.05; }
  .hero .lead{ color:var(--text-muted); font-size:17px; max-width:560px; margin:16px auto 0; }
  .role-grid{ display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:38px; }
  @media (max-width:640px){ .role-grid{ grid-template-columns:1fr; } .hero h1{ font-size:32px; } }
  .role-card{
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg);
    padding:30px 26px; cursor:pointer; text-align:left; transition:.18s; position:relative; overflow:hidden;
  }
  .role-card:hover{ transform:translateY(-3px); border-color:var(--border-strong); box-shadow:var(--shadow-card); }
  .role-card .role-icon{ width:52px; height:52px; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:24px; margin-bottom:16px; }
  .role-card.student .role-icon{ background:var(--a2-dim); }
  .role-card.teacher .role-icon{ background:var(--c1-dim); }
  .role-card h3{ font-size:20px; margin-bottom:6px; }

  /* ---------- signal ladder (signature element) ---------- */
  .ladder-wrap{ position:relative; width:64px; flex:none; }
  .ladder-track{ position:absolute; left:31px; top:6px; bottom:6px; width:2px; background:var(--border); }
  .ladder-track-fill{ position:absolute; left:31px; top:6px; width:2px; background:linear-gradient(var(--a2), var(--c1)); transition: height .5s ease; }
  .rung{
    width:20px; height:20px; border-radius:50%; background:var(--surface-2); border:2px solid var(--border-strong);
    display:flex; align-items:center; justify-content:center; position:relative; z-index:1; margin:0 auto;
    transition:.2s;
  }
  .rung.done{ border-color: transparent; }
  .rung.current{ box-shadow:0 0 0 5px rgba(255,182,72,0.18); border-color:var(--accent); }
  .rung-dot{ width:8px; height:8px; border-radius:50%; background:var(--text-dim); }
  .rung.done .rung-dot{ background:#0D0F20; }
  .rung-check{ font-size:11px; color:#0D0F20; font-weight:900; display:none; }
  .rung.done .rung-check{ display:block; } .rung.done .rung-dot{ display:none; }

  /* ---------- test top hud ---------- */
  .test-hud{ display:flex; align-items:center; gap:16px; padding:16px 22px; border-bottom:1px solid var(--border); background:rgba(18,20,42,0.7); backdrop-filter:blur(6px); position:sticky; top:0; z-index:10; }
  .hud-progress{ flex:1; height:8px; background:var(--surface-2); border-radius:99px; overflow:hidden; }
  .hud-progress-fill{ height:100%; background:linear-gradient(90deg, var(--a2), var(--accent)); transition:width .4s ease; border-radius:99px; }
  .hud-stat{ font-family:var(--font-mono); font-size:14px; font-weight:600; display:flex; align-items:center; gap:6px; white-space:nowrap; }
  .streak-flame{ filter: grayscale(1); opacity:.4; transition:.2s; }
  .streak-flame.hot{ filter:none; opacity:1; }

  /* ---------- exercise area ---------- */
  .test-body{ display:flex; gap:28px; flex:1; }
  .test-main{ flex:1; min-width:0; padding: 30px 24px 60px; }
  @media (max-width:800px){ .test-body{ flex-direction:column-reverse; } .ladder-wrap{ width:100%; height:56px; } .ladder-track{ display:none; } .rung{ display:none; } }

  .structure-badge{ display:flex; align-items:center; gap:10px; margin-bottom:22px; }
  .exercise-kicker{ font-family:var(--font-mono); font-size:12px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:10px; }
  .exercise-prompt{ font-family:var(--font-display); font-size:26px; font-weight:600; line-height:1.35; margin-bottom:26px; }
  .exercise-prompt .blank{ display:inline-block; min-width:60px; border-bottom:3px solid var(--accent); }

  .mc-options{ display:flex; flex-direction:column; gap:12px; max-width:520px; }
  .mc-opt{ background:var(--surface-2); border:2px solid var(--border); border-radius:14px; padding:15px 18px; text-align:left; font-size:16px; color:var(--text); cursor:pointer; transition:.15s; font-family:var(--font-body); }
  .mc-opt:hover{ border-color:var(--border-strong); }
  .mc-opt.selected{ border-color:var(--accent); background:var(--b2-dim); }
  .mc-opt.correct{ border-color:var(--good); background:var(--b1-dim); }
  .mc-opt.incorrect{ border-color:var(--bad); background:rgba(255,107,107,0.12); }

  .chip-zone{ display:flex; flex-wrap:wrap; gap:10px; min-height:52px; padding:14px; background:var(--surface-2); border:1.5px dashed var(--border-strong); border-radius:14px; }
  .slot{ min-width:70px; min-height:44px; border-radius:10px; background:rgba(255,255,255,0.03); display:flex; align-items:center; justify-content:center; }
  .word-chip{
    background:var(--surface-3); border:1px solid var(--border-strong); color:var(--text); padding:10px 16px;
    border-radius:10px; font-size:15px; font-weight:600; cursor:grab; user-select:none; transition:.15s;
  }
  .word-chip:hover{ border-color:var(--accent-2); transform:translateY(-1px); }
  .word-chip.placed{ background: linear-gradient(135deg, var(--accent), #FF8F5E); color:#1A1400; border-color:transparent; }
  .word-chip.dragging{ opacity:0.4; }
  .bank-zone{ margin-top:14px; }

  .free-input{ max-width:560px; }
  .cue-words{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; }
  .cue-word{ background:var(--surface-3); padding:6px 12px; border-radius:8px; font-family:var(--font-mono); font-size:13px; color:var(--accent-2); }

  .feedback-box{ margin-top:22px; padding:18px 20px; border-radius:14px; max-width:560px; animation: pop .25s ease; }
  @keyframes pop{ from{ transform:scale(0.96); opacity:0; } to{ transform:scale(1); opacity:1; } }
  .feedback-box.correct{ background:rgba(140,242,107,0.1); border:1px solid rgba(140,242,107,0.35); }
  .feedback-box.incorrect{ background:rgba(255,107,107,0.1); border:1px solid rgba(255,107,107,0.35); }
  .feedback-box.review{ background:rgba(201,166,255,0.1); border:1px solid rgba(201,166,255,0.35); }
  .feedback-title{ font-weight:700; font-family:var(--font-display); margin-bottom:6px; display:flex; align-items:center; gap:8px; }
  .feedback-title.correct{ color:var(--good); } .feedback-title.incorrect{ color:var(--bad); } .feedback-title.review{ color:var(--review); }
  .model-answer{ margin-top:10px; font-size:14px; color:var(--text-muted); }
  .model-answer b{ color:var(--text); }

  .xp-pop{ position:fixed; top:20px; right:24px; background:var(--surface-3); border:1px solid var(--accent); color:var(--accent); font-family:var(--font-mono); font-weight:700; padding:10px 18px; border-radius:99px; z-index:100; animation: floatup 1.6s ease forwards; }
  @keyframes floatup{ 0%{ opacity:0; transform:translateY(8px);} 15%{opacity:1; transform:translateY(0);} 80%{opacity:1;} 100%{opacity:0; transform:translateY(-14px);} }

  .toast-banner{ position:fixed; top:20px; left:50%; transform:translateX(-50%); background:var(--surface-3); border:1px solid var(--border-strong); padding:14px 26px; border-radius:99px; z-index:100; font-weight:700; box-shadow:var(--shadow-card); animation: pop .3s ease; }

  .intro-card{ text-align:center; max-width:600px; margin: 40px auto; }
  .intro-card .icon-orb{ width:84px; height:84px; border-radius:24px; margin:0 auto 20px; display:flex; align-items:center; justify-content:center; font-size:34px; }

  /* ---------- teacher ---------- */
  .group-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(260px,1fr)); gap:18px; margin-top:20px; }
  .group-card{ cursor:pointer; transition:.15s; }
  .group-card:hover{ border-color:var(--border-strong); transform:translateY(-2px); }
  .code-pill{ font-family:var(--font-mono); background:var(--surface-3); padding:5px 12px; border-radius:8px; font-size:13px; letter-spacing:0.06em; }

  .level-picker{ display:flex; gap:10px; flex-wrap:wrap; }
  .level-opt{ flex:1; min-width:110px; border:2px solid var(--border); background:var(--surface-2); border-radius:14px; padding:14px; text-align:center; cursor:pointer; }
  .level-opt.sel-A2.active{ border-color:var(--a2); background:var(--a2-dim); }
  .level-opt.sel-B1.active{ border-color:var(--b1); background:var(--b1-dim); }
  .level-opt.sel-B2.active{ border-color:var(--b2); background:var(--b2-dim); }
  .level-opt.sel-C1.active{ border-color:var(--c1); background:var(--c1-dim); }

  .struct-pick-grid{ display:grid; grid-template-columns:1fr 1fr; gap:24px; align-items:start; }
  @media (max-width:760px){ .struct-pick-grid{ grid-template-columns:1fr; } }
  .struct-item{ display:flex; align-items:center; gap:12px; padding:12px 14px; border-radius:12px; border:1px solid var(--border); margin-bottom:8px; cursor:pointer; }
  .struct-item:hover{ border-color:var(--border-strong); }
  .struct-item.checked{ background:var(--surface-2); }
  .checkbox{ width:20px; height:20px; border-radius:6px; border:2px solid var(--border-strong); flex:none; display:flex; align-items:center; justify-content:center; }
  .checkbox.on{ background:var(--accent); border-color:var(--accent); color:#1A1400; font-weight:900; font-size:12px; }
  .order-item{ display:flex; align-items:center; gap:10px; background:var(--surface-2); border:1px solid var(--border); border-radius:12px; padding:10px 12px; margin-bottom:8px; }
  .order-idx{ font-family:var(--font-mono); color:var(--text-dim); font-size:13px; width:20px; }

  table.data-table{ width:100%; border-collapse:collapse; }
  table.data-table th{ text-align:left; font-size:12px; text-transform:uppercase; letter-spacing:0.05em; color:var(--text-dim); padding:10px 12px; border-bottom:1px solid var(--border); }
  table.data-table td{ padding:12px; border-bottom:1px solid var(--border); font-size:14px; }
  table.data-table tr.row-click{ cursor:pointer; }
  table.data-table tr.row-click:hover td{ background:rgba(255,255,255,0.02); }

  .bar-row{ display:flex; align-items:center; gap:12px; margin-bottom:12px; }
  .bar-label{ width:230px; flex:none; font-size:13px; }
  .bar-track{ flex:1; height:10px; background:var(--surface-2); border-radius:99px; overflow:hidden; }
  .bar-fill{ height:100%; border-radius:99px; transition:width .6s ease; }
  .bar-pct{ width:44px; text-align:right; font-family:var(--font-mono); font-size:13px; flex:none; }

  /* ---------- tuner dial ---------- */
  .dial-wrap{ display:flex; flex-direction:column; align-items:center; margin: 10px auto 30px; }
  .dial{ width:240px; height:150px; position:relative; }
  .dial svg{ width:100%; height:100%; overflow:visible; }
  .dial-needle{ position:absolute; left:50%; bottom:8px; width:4px; height:98px; background:var(--text); border-radius:4px; transform-origin:bottom center; transform:translateX(-50%) rotate(-60deg); transition: transform 1.4s cubic-bezier(.2,1.4,.4,1); }
  .dial-needle::after{ content:""; position:absolute; bottom:-7px; left:50%; transform:translateX(-50%); width:16px; height:16px; border-radius:50%; background:var(--accent); box-shadow:0 0 14px var(--accent); }
  .dial-readout{ margin-top:14px; text-align:center; }
  .dial-level{ font-family:var(--font-display); font-size:40px; font-weight:700; }
  .dial-pct{ font-family:var(--font-mono); color:var(--text-muted); font-size:15px; }

  .rec-card{ border-left:4px solid var(--accent); padding-left:16px; margin-bottom:18px; }
  .rec-card.strong{ border-left-color:var(--good); }
  .rec-card ul{ margin:8px 0 0; padding-left:18px; color:var(--text-muted); font-size:14px; }
  .rec-card ul li{ margin-bottom:4px; }
  .rec-link{ display:inline-flex; align-items:center; gap:6px; margin-top:8px; font-size:13px; font-weight:600; text-decoration:none; }

  details.review-structure{ border:1px solid var(--border); border-radius:14px; margin-bottom:12px; overflow:hidden; }
  details.review-structure summary{ padding:16px 20px; cursor:pointer; list-style:none; display:flex; align-items:center; justify-content:space-between; }
  details.review-structure summary::-webkit-details-marker{ display:none; }
  .review-item{ padding:16px 20px; border-top:1px solid var(--border); }
  .review-item .q{ font-family:var(--font-mono); font-size:14px; margin-bottom:8px; color:var(--text-muted); }
  .review-item .a-row{ display:flex; gap:8px; align-items:flex-start; font-size:14px; margin-bottom:4px; }
  .status-icon{ flex:none; width:20px; }
  .status-icon.ok{ color:var(--good); } .status-icon.bad{ color:var(--bad); } .status-icon.rev{ color:var(--review); }

  footer.app-foot{ text-align:center; padding:20px; color:var(--text-dim); font-size:12px; }

  .empty-state{ text-align:center; padding:50px 20px; color:var(--text-muted); }
  .empty-state .icon{ font-size:38px; margin-bottom:12px; }

  .modal-backdrop{ position:fixed; inset:0; background:rgba(10,11,24,0.72); backdrop-filter:blur(3px); display:flex; align-items:center; justify-content:center; z-index:200; padding:20px; }
  .modal{ background:var(--surface); border:1px solid var(--border-strong); border-radius:var(--radius-lg); padding:28px; max-width:440px; width:100%; box-shadow:var(--shadow-card); }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.001ms !important; transition-duration:0.001ms !important; }
  }
</style>
</head>
<body>
<div id="app"></div>
<script>
// ============================================================
// DATA: CEFR levels, resource links, and the 16 grammar structures
// Content basis: English Grammar Profile / Cambridge criterial
// features per CEFR level, cross-checked with Test-English.com,
// Your English Pal grammar-by-level index, and Tracktest CEFR
// grammar requirement lists.
// ============================================================

const LEVELS = [
  { id: "A2", label: "A2 – Elementary", color: "var(--a2)" },
  { id: "B1", label: "B1 – Intermediate", color: "var(--b1)" },
  { id: "B2", label: "B2 – Upper-Intermediate", color: "var(--b2)" },
  { id: "C1", label: "C1 – Advanced", color: "var(--c1)" }
];

const RESOURCES = {
  bc: { name: "British Council – LearnEnglish Teens", url: "https://learnenglishteens.britishcouncil.org/grammar-vocabulary" },
  te: { name: "Test-English.com Grammatik-Übersicht", url: "https://test-english.com/grammar-points/contents/" },
  ego: { name: "ego4u.com Grammatik", url: "https://www.ego4u.com/en/cram-up/grammar" },
  eh: { name: "Englisch-hilfen.de Grammatik", url: "https://www.englisch-hilfen.de/en/grammar_list/alle.htm" }
};

// helper to keep item objects short to write
function mc(prompt, options, answerIndex, explanation) {
  return { type: "mc", prompt, options, answerIndex, explanation };
}
function gap(prompt, accepted, explanation) {
  return { type: "gap", prompt, accepted, explanation };
}
function order(words, correct, explanation) {
  return { type: "order", words, correct, explanation };
}
function transform(prompt, accepted, explanation) {
  return { type: "transform", prompt, accepted, explanation };
}

// ---------- storage helpers ----------
async function storageGetRaw(key, shared) {
  try { const r = await window.storage.get(key, !!shared); return r ? r.value : null; }
  catch (e) { return null; }
}
async function storageSetRaw(key, value, shared) {
  try { return await window.storage.set(key, value, !!shared); }
  catch (e) { console.error("storage set failed", key, e); return null; }
}
async function getJSON(key, shared) {
  const raw = await storageGetRaw(key, shared);
  if (!raw) return null;
  try { return JSON.parse(raw); } catch (e) { return null; }
}
async function setJSON(key, obj, shared) {
  return storageSetRaw(key, JSON.stringify(obj), shared);
}
async function listKeys(prefix, shared) {
  try { const r = await window.storage.list(prefix, !!shared); return r ? r.keys : []; }
  catch (e) { return []; }
}

// ---------- small utils ----------
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }
function genCode() {
  const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let s = "";
  for (let i = 0; i < 6; i++) s += chars[Math.floor(Math.random() * chars.length)];
  return s;
}
function escapeHtml(str) {
  if (str == null) return "";
  return String(str)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}
function normalize(str) {
  return String(str || "").trim().toLowerCase().replace(/[.,!?;:]/g, "").replace(/\s+/g, " ").trim();
}
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function levelColor(lvl) {
  return { A2: "var(--a2)", B1: "var(--b1)", B2: "var(--b2)", C1: "var(--c1)" }[lvl] || "var(--text)";
}
function structureById(id) { return STRUCTURES.find(s => s.id === id); }

// ---------- scoring ----------
// returns { status: 'correct'|'incorrect'|'review', studentAnswerDisplay, modelAnswerDisplay }
function scoreMC(item, selIndex) {
  const has = selIndex !== null && selIndex !== undefined && selIndex >= 0;
  const correct = has && selIndex === item.answerIndex;
  return {
    status: correct ? "correct" : "incorrect",
    studentAnswerDisplay: has ? item.options[selIndex] : "(keine Antwort)",
    modelAnswerDisplay: item.options[item.answerIndex]
  };
}
function scoreGapLike(item, value) {
  const v = (value || "").trim();
  const correct = v.length > 0 && item.accepted.some(a => normalize(a) === normalize(v));
  return {
    status: correct ? "correct" : "incorrect",
    studentAnswerDisplay: v.length ? v : "(keine Antwort)",
    modelAnswerDisplay: item.accepted[0]
  };
}
function scoreOrder(item, words) {
  const joined = (words || []).join(" ");
  const correct = words && words.length > 0 && normalize(joined) === normalize(item.correct);
  return {
    status: correct ? "correct" : "incorrect",
    studentAnswerDisplay: words && words.length ? joined : "(keine Antwort)",
    modelAnswerDisplay: item.correct
  };
}
function scoreSentence(item, value) {
  const v = (value || "").trim();
  const wordCount = v.split(/\s+/).filter(Boolean).length;
  let status = "incorrect";
  if (wordCount >= 3) {
    status = item.regex.test(v) ? "correct" : "review";
  }
  return {
    status,
    studentAnswerDisplay: v.length ? v : "(keine Antwort)",
    modelAnswerDisplay: item.modelAnswer
  };
}
const XP_BY_TYPE = { mc: 10, gap: 15, order: 15, transform: 20, sentence: 25 };
function xpForResult(type, status) {
  const base = XP_BY_TYPE[type] || 10;
  if (status === "correct") return base;
  if (status === "review") return Math.round(base / 2);
  return 0;
}
function scoreValueForStatus(status) {
  if (status === "correct") return 1;
  if (status === "review") return 0.5;
  return 0;
}

// ---------- level computation ----------
function computeLevelResult(answers, structureIds) {
  // aggregate per structure
  const byStructure = {};
  structureIds.forEach(id => { byStructure[id] = { sum: 0, total: 0 }; });
  answers.forEach(a => {
    if (!byStructure[a.structureId]) byStructure[a.structureId] = { sum: 0, total: 0 };
    byStructure[a.structureId].sum += scoreValueForStatus(a.status);
    byStructure[a.structureId].total += 1;
  });
  const structureResults = {};
  Object.keys(byStructure).forEach(id => {
    const { sum, total } = byStructure[id];
    structureResults[id] = { percent: total ? Math.round((sum / total) * 100) : 0, sum, total };
  });

  // aggregate per level (avg percent of structures at that level that were tested)
  const levelOrder = ["A2", "B1", "B2", "C1"];
  const levelPercents = {};
  levelOrder.forEach(lvl => {
    const ids = structureIds.filter(id => structureById(id) && structureById(id).level === lvl);
    if (!ids.length) { levelPercents[lvl] = null; return; }
    const avg = ids.reduce((s, id) => s + structureResults[id].percent, 0) / ids.length;
    levelPercents[lvl] = Math.round(avg);
  });

  const THRESHOLD = 60;
  let achieved = null;
  let lowestTestedFailed = null;
  for (const lvl of levelOrder) {
    if (levelPercents[lvl] == null) continue;
    if (levelPercents[lvl] >= THRESHOLD) {
      achieved = lvl;
    } else {
      lowestTestedFailed = lvl;
      break;
    }
  }
  const overallPercent = structureIds.length
    ? Math.round(structureIds.reduce((s, id) => s + structureResults[id].percent, 0) / structureIds.length)
    : 0;

  return { structureResults, levelPercents, achieved, lowestTestedFailed, overallPercent };
}

function buildFeedback(structureResults, structureIds) {
  const arr = structureIds.map(id => ({ id, ...structureResults[id], meta: structureById(id) })).filter(s => s.meta);
  const weak = arr.filter(s => s.percent < 70).sort((a, b) => a.percent - b.percent).slice(0, 5);
  const strong = arr.filter(s => s.percent >= 85).sort((a, b) => b.percent - a.percent).slice(0, 4);
  return { weak, strong };
}

function totalItemsCount() { return state.test.structureIds.length * 7; }
function completedItemsCount() {
  const t = state.test;
  return t.structIdx * 7 + Math.max(0, t.itemIdx);
}

function screenStudentTest() {
  const t = state.test;
  const structIds = t.structureIds;
  const struct = structureById(structIds[t.structIdx]);
  const ladderHtml = structIds.map((id, i) => {
    const s = structureById(id);
    let cls = "rung";
    if (i < t.structIdx) cls += " done";
    else if (i === t.structIdx) cls += " current";
    return `<div class="${cls}" title="${escapeHtml(s.name)}" style="border-color:${i <= t.structIdx ? levelColor(s.level) : ""}">
      <span class="rung-dot" style="background:${i < t.structIdx ? levelColor(s.level) : ""}"></span><span class="rung-check">✓</span>
    </div>`;
  }).join("");

  const progressPct = Math.round((completedItemsCount() / totalItemsCount()) * 100);

  let bodyHtml;
  if (t.itemIdx === -1) {
    bodyHtml = structureIntro(struct);
  } else {
    bodyHtml = exerciseView(struct, t.itemIdx, t.checked, t.lastResult, t.lastRawAnswer);
  }

  return `
    <div class="test-hud">
      <div class="hud-stat mono" style="color:var(--accent)">⚡ ${t.xp} XP</div>

function exerciseView(struct, itemIdx, checked, lastResult, lastRawAnswer) {
  const item = struct.items[itemIdx];
  const kicker = `Aufgabe ${itemIdx + 1} / 7 · ${escapeHtml(struct.name)}`;
  let inputHtml = "";
  let feedback = "";

  if (item.type === "mc") {
    inputHtml = `<div class="exercise-prompt">${renderPromptWithBlank(item.prompt)}</div>
      <div class="mc-options" id="mcOptions">
        ${item.options.map((opt, i) => {
          let cls = "mc-opt";
          if (checked) {
            if (i === item.answerIndex) cls += " correct";
            else if (i === lastRawAnswer) cls += " incorrect";
          }
          return `<button type="button" class="${cls}" data-mc-idx="${i}" ${checked ? "disabled" : ""}>${escapeHtml(opt)}</button>`;
        }).join("")}
      </div>`;
  } else if (item.type === "gap" || item.type === "transform") {
    const val = checked ? (lastRawAnswer || "") : "";
    inputHtml = `<div class="exercise-prompt">${item.type === "gap" ? renderPromptWithBlank(item.prompt) : escapeHtml(item.prompt)}</div>
      <div class="free-input">
        <input type="text" id="textAnswer" placeholder="${item.type === "transform" ? "Schreib den korrigierten Satz…" : "Deine Antwort…"}" ${checked ? "disabled" : ""} value="${escapeHtml(val)}">
      </div>`;
  } else if (item.type === "order") {
    if (checked) {
      const arranged = Array.isArray(lastRawAnswer) && lastRawAnswer.length ? lastRawAnswer.join(" ") : "(keine Antwort)";
      inputHtml = `<div class="exercise-prompt">Bring die Wörter in die richtige Reihenfolge.</div>
        <div class="card-flat mono">${escapeHtml(arranged)}</div>`;
    } else {
      const scrambled = shuffle(item.words.map((w, i) => ({ w, i })));
      inputHtml = `<div class="exercise-prompt">Bring die Wörter in die richtige Reihenfolge.</div>
        <div class="chip-zone" id="slotsZone">
          ${item.words.map(() => `<div class="slot"></div>`).join("")}
        </div>
        <div class="chip-zone bank-zone" id="bankZone">
          ${scrambled.map(({ w, i }) => `<div class="word-chip" draggable="true" data-word="${escapeHtml(w)}" data-word-idx="${i}">${escapeHtml(w)}</div>`).join("")}
        </div>`;
    }
  } else if (item.type === "sentence") {
    const val = checked ? (lastRawAnswer || "") : "";
    inputHtml = `<div class="exercise-prompt">${escapeHtml(item.prompt)}</div>
      ${item.cueWords ? `<div class="cue-words">${item.cueWords.map(c => `<span class="cue-word">${escapeHtml(c)}</span>`).join("")}</div>` : ""}
      <div class="free-input">
        <textarea id="textAnswer" placeholder="Schreib deinen Satz auf Englisch…" ${checked ? "disabled" : ""}>${escapeHtml(val)}</textarea>
      </div>`;
  }

  if (checked && lastResult) {
    const statusClass = lastResult.status === "correct" ? "correct" : lastResult.status === "review" ? "review" : "incorrect";
    const title = lastResult.status === "correct" ? "Richtig! ✓" : lastResult.status === "review" ? "Wird von deiner Lehrkraft geprüft" : "Nicht ganz ✗";
    feedback = `
      <div class="feedback-box ${statusClass}">
        <div class="feedback-title ${statusClass}">${title}</div>
        <p>${escapeHtml(item.explanation)}</p>
        ${lastResult.status !== "correct" ? `<div class="model-answer"><b>Musterlösung:</b> ${escapeHtml(lastResult.modelAnswerDisplay)}</div>` : ""}
      </div>
      <button class="btn btn-primary" style="margin-top:20px;" data-action="nextItem">Weiter →</button>
    `;
  } else {
    feedback = `<button class="btn btn-primary" style="margin-top:26px;" data-action="checkItem">Antwort prüfen</button>`;
  }

  return `<div class="exercise-kicker">${kicker}</div>${inputHtml}${feedback}`;
}

function renderPromptWithBlank(prompt) {
  return escapeHtml(prompt).replace(/___+/g, '<span class="blank">&nbsp;</span>');
}

// ============================================================
// EXERCISE INTERACTIONS (direct DOM, no full re-render)
// ============================================================
function wireExerciseInteractions() {
  const t = state.test;
  if (!t || t.itemIdx === -1) return;
  const struct = structureById(t.structureIds[t.structIdx]);
  const item = struct.items[t.itemIdx];
  if (t.checked) return;

  if (item.type === "mc") {
    document.querySelectorAll("#mcOptions .mc-opt").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll("#mcOptions .mc-opt").forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
      });
    });
  } else if (item.type === "order") {
    const bank = document.getElementById("bankZone");
    const slots = document.getElementById("slotsZone");
    if (!bank || !slots) return;

    function moveToNextSlot(chip) {
      const emptySlot = Array.from(slots.children).find(s => s.children.length === 0);
      if (emptySlot) { emptySlot.appendChild(chip); chip.classList.add("placed"); }
    }
    function moveToBank(chip) { bank.appendChild(chip); chip.classList.remove("placed"); }

    function wireChip(chip) {
      chip.setAttribute("tabindex", "0");
      chip.setAttribute("role", "button");
      chip.addEventListener("click", () => {
        if (chip.parentElement === bank) moveToNextSlot(chip); else moveToBank(chip);
      });
      chip.addEventListener("keydown", e => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          if (chip.parentElement === bank) moveToNextSlot(chip); else moveToBank(chip);
        }
      });
      chip.addEventListener("dragstart", e => {
        chip.classList.add("dragging");
        e.dataTransfer.setData("text/plain", chip.dataset.wordIdx);
      });
      chip.addEventListener("dragend", () => chip.classList.remove("dragging"));
    }
    Array.from(bank.children).forEach(wireChip);

    [bank, slots].forEach(zone => {
      zone.addEventListener("dragover", e => e.preventDefault());
      zone.addEventListener("drop", e => {
        e.preventDefault();
        const idx = e.dataTransfer.getData("text/plain");
        const chip = document.querySelector(`.word-chip[data-word-idx="${idx}"]`);
        if (!chip) return;
        if (zone === bank) moveToBank(chip); else moveToNextSlot(chip);
      });
    });
  }
}

function showXpPop(amount) {
  if (amount <= 0) return;
  const el = document.createElement("div");
  el.className = "xp-pop";
  el.textContent = "+" + amount + " XP";
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1600);
}
function showToast(text) {
  const el = document.createElement("div");
  el.className = "toast-banner";
  el.textContent = text;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1800);
}

function goLanding() { Object.assign(state, { screen: "landing", error: null }); render(); }
function goStudentJoin() { state.screen = "studentJoin"; state.joinError = null; render(); }

async function submitJoin() {
  const codeEl = document.getElementById("joinCodeInput");
  const nameEl = document.getElementById("joinNameInput");
  const code = (codeEl.value || "").trim().toUpperCase();
  const name = (nameEl.value || "").trim();
  state.joinCode = code; state.joinName = name;
  if (!code || !name) { state.joinError = "Bitte gib Code und Namen ein."; render(); return; }
  state.loading = true; state.joinError = null; render();
  const group = await getJSON("group:" + code, true);
  state.loading = false;
  if (!group) { state.joinError = "Diesen Gruppen-Code konnten wir nicht finden. Bitte prüfe die Eingabe."; render(); return; }
  state.currentGroup = group;
  state.screen = "studentIntro";
  render();
}

function startTest() {
  state.test = {
    code: state.currentGroup.code,
    studentId: uid(),
    studentName: state.joinName,
    structureIds: state.currentGroup.structureIds,
    structIdx: 0,
    itemIdx: -1,
    answers: [],
    xp: 0,
    streak: 0,
    checked: false,
    lastResult: null,
    lastRawAnswer: null,
    startedAt: new Date().toISOString()
  };
  state.screen = "studentTest";
  render();
}

function beginStructureItems() {
  state.test.itemIdx = 0;
  state.test.checked = false;
  render();
}

function readCurrentAnswerRaw(item) {
  if (item.type === "mc") {
    const sel = document.querySelector("#mcOptions .mc-opt.selected");
    if (!sel) return null;
    return Array.from(document.querySelectorAll("#mcOptions .mc-opt")).indexOf(sel);
  }
  if (item.type === "gap" || item.type === "transform" || item.type === "sentence") {
    const el = document.getElementById("textAnswer");
    return el ? el.value : "";
  }
  if (item.type === "order") {
    const slots = document.getElementById("slotsZone");
    if (!slots) return [];
    return Array.from(slots.children).filter(s => s.children.length).map(s => s.children[0].dataset.word);
  }
  return null;
}

function checkItem() {
  const t = state.test;
  const struct = structureById(t.structureIds[t.structIdx]);
  const item = struct.items[t.itemIdx];
  const raw = readCurrentAnswerRaw(item);

  let result;
  if (item.type === "mc") result = scoreMC(item, raw);
  else if (item.type === "gap" || item.type === "transform") result = scoreGapLike(item, raw);
  else if (item.type === "order") result = scoreOrder(item, raw);
  else if (item.type === "sentence") result = scoreSentence(item, raw);

  const xp = xpForResult(item.type, result.status);
  t.xp += xp;
  if (result.status === "correct") t.streak += 1; else if (result.status === "incorrect") t.streak = 0;

  t.answers.push({
    structureId: struct.id,
    itemIndex: t.itemIdx,
    type: item.type,
    prompt: item.prompt,
    status: result.status,
    studentAnswerDisplay: result.studentAnswerDisplay,
    modelAnswerDisplay: result.modelAnswerDisplay,
    explanation: item.explanation
  });

  t.checked = true;
  t.lastResult = result;
  t.lastRawAnswer = raw;
  render();
  showXpPop(xp);
}

async function nextItem() {
  const t = state.test;
  t.checked = false;
  t.lastResult = null;
  t.lastRawAnswer = null;
  t.itemIdx += 1;
  if (t.itemIdx >= 7) {
    t.structIdx += 1;
    t.itemIdx = -1;
    if (t.structIdx >= t.structureIds.length) {
      await finishTest();
      return;
    }
    showToast("Struktur geschafft! 🎉");
  }
  render();
}

function quitTest() {
  if (confirm("Test wirklich abbrechen? Dein Fortschritt geht verloren.")) {
    state.test = null;
    state.screen = "studentIntro";
    render();
  }
}

async function finishTest() {
  const t = state.test;
  t.finishedAt = new Date().toISOString();
  const levelResult = computeLevelResult(t.answers, t.structureIds);
  const feedback = buildFeedback(levelResult.structureResults, t.structureIds);

  const submission = {
    studentId: t.studentId,
    studentName: t.studentName,
    code: t.code,
    structureIds: t.structureIds,
    answers: t.answers,
    xp: t.xp,
    startedAt: t.startedAt,
    finishedAt: t.finishedAt,
    structureResults: levelResult.structureResults,
    levelPercents: levelResult.levelPercents,
    achievedLevel: levelResult.achieved,
    lowestTestedFailed: levelResult.lowestTestedFailed,
    overallPercent: levelResult.overallPercent
  };

  await setJSON("submission:" + t.code + ":" + t.studentId, submission, true);

  state.finalResult = { submission, feedback };
  state.test = null;
  state.screen = "studentResults";
  render();
}

  const d = state.createDraft;
  const idx = d.structureIds.indexOf(id);
  if (idx >= 0) d.structureIds.splice(idx, 1); else d.structureIds.push(id);
  render();
}
function moveStructUp(id) {
  const d = state.createDraft; const i = d.structureIds.indexOf(id);
  if (i > 0) { [d.structureIds[i - 1], d.structureIds[i]] = [d.structureIds[i], d.structureIds[i - 1]]; render(); }
}
function moveStructDown(id) {
  const d = state.createDraft; const i = d.structureIds.indexOf(id);
  if (i >= 0 && i < d.structureIds.length - 1) { [d.structureIds[i + 1], d.structureIds[i]] = [d.structureIds[i], d.structureIds[i + 1]]; render(); }
}
function removeStruct(id) {
  const d = state.createDraft; d.structureIds = d.structureIds.filter(x => x !== id); render();
}

async function submitCreateGroup() {
  const nameEl = document.getElementById("groupNameInput");
  const d = state.createDraft;
  d.name = (nameEl.value || "").trim();
  if (!d.name) { state.error = "Bitte gib einen Gruppennamen ein."; render(); return; }
  if (d.structureIds.length === 0) { state.error = "Bitte wähle mindestens eine Grammatikstruktur aus."; render(); return; }
  state.error = null; state.loading = true; render();

  let code = genCode();
  let existing = await getJSON("group:" + code, true);
  let tries = 0;
  while (existing && tries < 5) { code = genCode(); existing = await getJSON("group:" + code, true); tries++; }

  const adminToken = uid();
  const group = {
    code, name: d.name, targetLevel: d.targetLevel, structureIds: d.structureIds,
    adminToken, createdAt: new Date().toISOString()
  };
  await setJSON("group:" + code, group, true);

  const myGroups = (await getJSON("myGroups", false)) || [];
  myGroups.unshift({ code, name: d.name, targetLevel: d.targetLevel, structureIds: d.structureIds, adminToken, createdAt: group.createdAt });
  await setJSON("myGroups", myGroups, false);

  state.loading = false;
  state.currentGroup = group;
  state.currentGroup.submissionCount = 0;
  state.screen = "teacherGroup";
  state.currentSubmissions = [];
  render();
}

async function openMyGroup(code) {
  const groups = (await getJSON("myGroups", false)) || [];
  const g = groups.find(x => x.code === code);
  if (!g) return;
  await loadTeacherGroup(g.code, g);
}

async function openGroupByToken() {
  const code = (state.openGroupCodeInput || "").trim().toUpperCase();
  const token = (state.openGroupTokenInput || "").trim();
  const group = await getJSON("group:" + code, true);
  if (!group || group.adminToken !== token) { state.error = "Code oder Admin-Schlüssel stimmen nicht."; render(); return; }
  state.error = null;
  await loadTeacherGroup(code, group);
}

async function loadTeacherGroup(code, groupMeta) {
  state.loading = true; state.screen = "teacherGroup"; render();
  const group = await getJSON("group:" + code, true) || groupMeta;
  const keys = await listKeys("submission:" + code + ":", true);
  const subs = [];
  for (const k of keys) {
    const s = await getJSON(k, true);
    if (s) subs.push(s);
  }
  subs.sort((a, b) => new Date(b.finishedAt) - new Date(a.finishedAt));
  state.currentGroup = group;
  state.currentSubmissions = subs;
  state.loading = false;
  render();
}

function screenTeacherGroup() {
  if (state.loading) return `${topbar(true, "goTeacherHome")}<div class="shell empty-state">Lade Gruppendaten…</div>`;
  const g = state.currentGroup;
  const subs = state.currentSubmissions;

  const distribution = { A2: 0, B1: 0, B2: 0, C1: 0, none: 0 };
  subs.forEach(s => { if (s.achievedLevel) distribution[s.achievedLevel]++; else distribution.none++; });

  return `
    ${topbar(true, "goTeacherHome")}
    <div class="shell">
      <div class="row between wrap" style="margin-bottom:6px;">
        <h2>${escapeHtml(g.name)}</h2>
        <span class="tag tag-${g.targetLevel}">Ziel: ${g.targetLevel}</span>
      </div>
      <div class="row gap-12" style="margin-bottom:26px;">
        <span class="code-pill">Code: ${g.code}</span>
        <button class="btn-icon" data-action="copyCode" title="Code kopieren">⧉</button>
        <span class="muted" style="font-size:13px;">Teile diesen Code mit deinen Schüler:innen.</span>
      </div>

      <div class="card" style="margin-bottom:24px;">
        <h3 style="margin-bottom:14px;">Niveau-Verteilung</h3>
        <div class="row gap-16 wrap">
          ${["A2", "B1", "B2", "C1"].map(l => `<div class="row gap-8"><span class="tag tag-${l}">${l}</span><b>${distribution[l]}</b></div>`).join("")}
          <div class="row gap-8"><span class="tag" style="background:var(--surface-3); color:var(--text-muted)">unter Niveau</span><b>${distribution.none}</b></div>
        </div>
      </div>

      <div class="card">
        <h3 style="margin-bottom:14px;">Einreichungen (${subs.length})</h3>
        ${subs.length === 0 ? `<div class="empty-state"><div class="icon">🕐</div><p>Noch keine Schüler:in hat den Test abgeschlossen.</p></div>` : `
        <table class="data-table">
          <thead><tr><th>Name</th><th>Niveau</th><th>Gesamt</th><th>XP</th><th>Datum</th></tr></thead>
          <tbody>
            ${subs.map(s => `
              <tr class="row-click" data-action="openSubmission" data-id="${s.studentId}">
                <td>${escapeHtml(s.studentName)}</td>
                <td><span class="tag tag-${s.achievedLevel || "B1"}" style="${s.achievedLevel ? "" : "background:var(--surface-3); color:var(--text-muted);"}">${s.achievedLevel || "unter " + (s.lowestTestedFailed || "A2")}</span></td>
                <td>${s.overallPercent}%</td>
                <td class="mono">${s.xp}</td>
                <td class="muted">${new Date(s.finishedAt).toLocaleDateString("de-DE")}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>`}
      </div>
    </div>
  `;
}

function openSubmission(studentId) {
  const sub = state.currentSubmissions.find(s => s.studentId === studentId);
  if (!sub) return;
  const feedback = buildFeedback(sub.structureResults, sub.structureIds);
  state.currentSubmission = { submission: sub, feedback };
  state.screen = "teacherStudent";
  render();
}

function copyCode() {
  const g = state.currentGroup;
  const text = g.code;
  if (navigator.clipboard) navigator.clipboard.writeText(text).then(() => showToast("Code kopiert: " + text)).catch(() => showToast("Code: " + text));
  else showToast("Code: " + text);
}

// ============================================================
// EVENT DELEGATION
// ============================================================
const ACTIONS = {
  goLanding, goStudentJoin, goTeacherHome, goTeacherCreate,
  submitJoin, startTest, beginStructureItems, checkItem, nextItem, quitTest,
  submitCreateGroup, openGroupByToken, copyCode
};

function attachHandlers() {
  app.querySelectorAll("[data-action]").forEach(el => {
    const action = el.dataset.action;
    el.addEventListener("click", () => {
      if (action === "toggleStruct") return toggleStruct(el.dataset.id);
      if (action === "moveStructUp") return moveStructUp(el.dataset.id);
      if (action === "moveStructDown") return moveStructDown(el.dataset.id);
      if (action === "removeStruct") return removeStruct(el.dataset.id);
      if (action === "setTargetLevel") return setTargetLevel(el.dataset.level);
      if (action === "openMyGroup") return openMyGroup(el.dataset.code);
      if (action === "openSubmission") return openSubmission(el.dataset.id);
      if (ACTIONS[action]) return ACTIONS[action]();
    });
  });
  wireExerciseInteractions();

  const groupNameInput = document.getElementById("groupNameInput");
  if (groupNameInput) {
    groupNameInput.addEventListener("input", e => { state.createDraft.name = e.target.value; });
  }
  const openCodeInput = document.getElementById("openCodeInput");
  if (openCodeInput) {
    openCodeInput.addEventListener("input", e => { state.openGroupCodeInput = e.target.value; });
  }
  const openTokenInput = document.getElementById("openTokenInput");
  if (openTokenInput) {
    openTokenInput.addEventListener("input", e => { state.openGroupTokenInput = e.target.value; });
  }

  // dial animation trigger (angle stored in data attribute)
  const needle = document.getElementById("dialNeedle");
  if (needle) {
    const targetAngle = needle.dataset.targetAngle;
    requestAnimationFrame(() => {
      needle.style.transform = "translateX(-50%) rotate(" + targetAngle + "deg)";
    });
  }
}

// ============================================================
// INIT
// ============================================================
render();

</script>
</body>
</html>
